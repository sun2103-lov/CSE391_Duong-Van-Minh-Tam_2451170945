<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Debug CSS Layout</title>

</head>
<body>
    <h1>Cách 1: Dùng border-box</h1>
    <div class="container way1">
        <div class="sidebar">Sidebar (300px)</div>
        <div class="content">Content (660px)</div>

        <div class="sidebar">Sidebar (300px thực tế)</div>

        <div style="clear: both;"></div>
    </div>
