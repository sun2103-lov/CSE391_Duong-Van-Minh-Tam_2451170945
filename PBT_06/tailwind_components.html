
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailwind Components Library</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

<!-- ================= NAVIGATION ================= -->

<h1 class="text-3xl font-bold mb-6">
    Component Library
</h1>

<nav class="bg-blue-600 text-white p-4 rounded-lg flex justify-between mb-8">
    <div class="font-bold">MyApp</div>

    <div class="space-x-4">
        <a href="#" class="hover:text-yellow-300">Home</a>
        <a href="#" class="hover:text-yellow-300">Products</a>
        <a href="#" class="hover:text-yellow-300">Contact</a>
    </div>
</nav>

<div class="flex gap-6 mb-10">

    <aside class="w-56 bg-white rounded-lg shadow p-4">
        <ul class="space-y-2">
            <li>
                <a href="#" class="block p-2 rounded hover:bg-blue-100">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="#" class="block p-2 rounded hover:bg-blue-100">
                    Orders
                </a>
            </li>

            <li>
                <a href="#" class="block p-2 rounded hover:bg-blue-100">
                    Users
                </a>
            </li>
        </ul>
    </aside>

</div>

<!-- ================= BUTTONS ================= -->

<section class="mb-10">

    <h2 class="text-2xl font-bold mb-4">
        Buttons
    </h2>

    <div class="flex flex-wrap gap-4">

        <button
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            Primary
        </button>

        <button
            class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">
            Secondary
        </button>

        <button
            class="border border-blue-600 text-blue-600 px-4 py-2 rounded hover:bg-blue-50">
            Outline
        </button>

        <button
            disabled
            class="bg-gray-300 text-gray-500 px-4 py-2 rounded cursor-not-allowed">
            Disabled
        </button>

        <button
            class="bg-green-600 text-white px-4 py-2 rounded flex items-center gap-2 hover:bg-green-700">

            <svg class="animate-spin h-5 w-5"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24">
                <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4">
                </circle>

                <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8v8z">
                </path>
            </svg>

            Loading
        </button>

    </div>

    <div class="flex gap-4 mt-4">

        <button class="bg-blue-500 text-white px-2 py-1 rounded text-sm">
            Small
        </button>

        <button class="bg-blue-500 text-white px-4 py-2 rounded">
            Medium
        </button>

        <button class="bg-blue-500 text-white px-6 py-3 rounded text-lg">
            Large
        </button>

    </div>

</section>

<!-- ================= CARDS ================= -->

<section class="mb-10">

    <h2 class="text-2xl font-bold mb-4">
        Cards
    </h2>

    <div class="grid md:grid-cols-3 gap-6">

        <!-- Product Card -->
        <div class="bg-white rounded-lg shadow hover:shadow-lg">

            <img
                src="https://picsum.photos/300/200"
                class="w-full rounded-t-lg">

            <div class="p-4">
                <h3 class="font-bold">Laptop Gaming</h3>
                <p class="text-gray-600">
                    25.000.000 VNĐ
                </p>
            </div>

        </div>

        <!-- Profile Card -->
        <div class="bg-white rounded-lg shadow p-4 text-center hover:shadow-lg">

            <img
                src="https://picsum.photos/100"
                class="mx-auto rounded-full mb-3">

            <h3 class="font-bold">
                Nguyễn Văn A
            </h3>

            <p class="text-gray-500">
                Frontend Developer
            </p>

        </div>

        <!-- Pricing Card -->
        <div class="bg-white rounded-lg shadow p-6 hover:shadow-lg">

            <h3 class="text-xl font-bold mb-2">
                Premium
            </h3>

            <p class="text-3xl font-bold mb-4">
                299K/tháng
            </p>

            <button
                class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
                Chọn gói
            </button>

        </div>

    </div>

</section>

<!-- ================= FORMS ================= -->

<section class="mb-10">

    <h2 class="text-2xl font-bold mb-4">
        Forms
    </h2>

    <div class="space-y-4 max-w-md">

        <div>
            <label class="block mb-1">
                Họ tên
            </label>

            <input
                type="text"
                class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block mb-1">
                Chuyên ngành
            </label>

            <select
                class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

                <option>CNTT</option>
                <option>Thiết kế</option>

            </select>
        </div>

        <div>
            <label class="block mb-1">
                Ghi chú
            </label>

            <textarea
                class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </textarea>
        </div>

        <div>
            <label class="block mb-2">
                Sở thích
            </label>

            <div class="space-y-2">

                <label class="flex gap-2">
                    <input type="checkbox">
                    Game
                </label>

                <label class="flex gap-2">
                    <input type="checkbox">
                    Âm nhạc
                </label>

            </div>
        </div>

    </div>

</section>

<!-- ================= ALERTS ================= -->

<section>

    <h2 class="text-2xl font-bold mb-4">
        Alerts
    </h2>

    <div class="space-y-3">

        <div class="bg-green-100 text-green-800 p-3 rounded flex justify-between">
            Success
            <button>✕</button>
        </div>

        <div class="bg-red-100 text-red-800 p-3 rounded flex justify-between">
            Error
            <button>✕</button>
        </div>

        <div class="bg-yellow-100 text-yellow-800 p-3 rounded flex justify-between">
            Warning
            <button>✕</button>
        </div>

        <div class="bg-blue-100 text-blue-800 p-3 rounded flex justify-between">
            Info
            <button>✕</button>
        </div>

    </div>

</section>

</body>
</html>
