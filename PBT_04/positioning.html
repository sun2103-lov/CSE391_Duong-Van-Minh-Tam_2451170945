<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Demo</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">LOGO</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Main Layout -->
    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h3>Danh mục</h3>

            <ul>
                <li>Điện thoại</li>
                <li>Laptop</li>
                <li>Tablet</li>
                <li>Phụ kiện</li>
            </ul>
        </aside>

        <!-- Content -->
        <main class="content">

            <div class="product-card">
                <span class="hot-badge">HOT</span>
                <h2>Sản phẩm 1</h2>
                <p>Mô tả sản phẩm...</p>
            </div>

            <div class="product-card">
                <span class="hot-badge">HOT</span>
                <h2>Sản phẩm 2</h2>
                <p>Mô tả sản phẩm...</p>
            </div>

            <div class="product-card">
                <span class="hot-badge">HOT</span>
                <h2>Sản phẩm 3</h2>
                <p>Mô tả sản phẩm...</p>
            </div>

            <div class="product-card">
                <span class="hot-badge">HOT</span>
                <h2>Sản phẩm 4</h2>
                <p>Mô tả sản phẩm...</p>
            </div>

            <div class="product-card">
                <span class="hot-badge">HOT</span>
                <h2>Sản phẩm 5</h2>
                <p>Mô tả sản phẩm...</p>
            </div>

        </main>

    </div>

    <!-- Scroll To Top -->
    <button class="scroll-top">↑</button>

</body>
</html>
