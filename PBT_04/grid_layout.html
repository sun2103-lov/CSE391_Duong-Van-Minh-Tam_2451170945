<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

<div class="container">

    <header class="header">
        <h1>E-Commerce Store</h1>
    </header>

    <section class="hero">
        <h2>🔥 Khuyến mãi lớn cuối tuần 🔥</h2>
        <p>Giảm giá đến 50% cho hàng trăm sản phẩm.</p>
    </section>

    <aside class="sidebar">
        <h3>Bộ lọc</h3>

        <label><input type="checkbox"> Điện thoại</label><br>
        <label><input type="checkbox"> Laptop</label><br>
        <label><input type="checkbox"> Tablet</label><br>
        <label><input type="checkbox"> Phụ kiện</label>
    </aside>

    <main class="main">

        <div class="card featured">
            <img src="https://via.placeholder.com/400x200" alt="">
            <h3>Sản phẩm nổi bật</h3>
            <p>Giảm giá đặc biệt.</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Sản phẩm 2</h3>
            <p>500.000đ</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Sản phẩm 3</h3>
            <p>600.000đ</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Sản phẩm 4</h3>
            <p>700.000đ</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Sản phẩm 5</h3>
            <p>800.000đ</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Sản phẩm 6</h3>
            <p>900.000đ</p>
        </div>

    </main>

    <aside class="ads">
        <img src="https://via.placeholder.com/180x600" alt="Advertisement">
    </aside>

    <footer class="footer">
        <p>© 2026 E-Commerce Store</p>
    </footer>

</div>

</body>
</html>
