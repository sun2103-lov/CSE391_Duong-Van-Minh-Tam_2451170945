<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

<header>
    <div class="logo">SHOP</div>

    <div class="hamburger">☰</div>

    <nav class="menu">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="container">

    <aside class="sidebar">
        <h3>Filter</h3>
        <label><input type="checkbox"> Laptop</label>
        <label><input type="checkbox"> Phone</label>
        <label><input type="checkbox"> Tablet</label>
    </aside>

    <main class="products">

        <div class="card"><img src="https://via.placeholder.com/300x200"><h3>SP 1</h3></div>
        <div class="card"><img src="https://via.placeholder.com/300x200"><h3>SP 2</h3></div>
        <div class="card"><img src="https://via.placeholder.com/300x200"><h3>SP 3</h3></div>
        <div class="card"><img src="https://via.placeholder.com/300x200"><h3>SP 4</h3></div>
        <div class="card"><img src="https://via.placeholder.com/300x200"><h3>SP 5</h3></div>
        <div class="card"><img src="https://via.placeholder.com/300x200"><h3>SP 6</h3></div>
        <div class="card"><img src="https://via.placeholder.com/300x200"><h3>SP 7</h3></div>
        <div class="card"><img src="https://via.placeholder.com/300x200"><h3>SP 8</h3></div>

    </main>

    <aside class="ads">
        <img src="https://via.placeholder.com/180x500">
    </aside>

</div>

<footer>
    Footer
</footer>

</body>
</html>
