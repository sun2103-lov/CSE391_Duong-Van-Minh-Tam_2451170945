<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng ký Tài khoản</title>
</head>
<body>
    <header>
        <h1>Form Đăng ký Tài khoản E-Commerce</h1>
    </header>
    <main>
        <form action="#" method="POST">
            <!-- Fieldset 1: Thông tin cá nhân -->
            <fieldset>
                <legend>Thông tin cá nhân</legend>
                
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập họ tên của bạn">
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Nhập địa chỉ email">
                
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Nhập 10 chữ số">
                
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob" max="2024-06-03">
            </fieldset>
            
            <!-- Fieldset 2: Tài khoản -->
            <fieldset>
                <legend>Tài khoản</legend>
                
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" pattern="[a-zA-Z0-9_]{3,20}" placeholder="3-20 ký tự (chữ cái, số, underscore)">
                
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9])" placeholder="Ít nhất 8 ký tự, có chữ hoa và số" title="Mật khẩu phải có ít nhất 1 chữ hoa và 1 số">
                
                <label for="confirm_password">Xác nhận mật khẩu:</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="8" placeholder="Nhập lại mật khẩu">
            </fieldset>
            
            <!-- Fieldset 3: Thông tin giao hàng -->
            <fieldset>
                <legend>Thông tin giao hàng</legend>
                
                <label for="city">Thành phố/Tỉnh:</label>
                <select id="city" name="city" required>
                    <option value="">-- Chọn thành phố --</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
                
                <label for="district">Quận/Huyện:</label>
                <select id="district" name="district">
                    <option value="">-- Chọn quận/huyện --</option>
                    <option value="q1">Quận 1</option>
                    <option value="q2">Quận 2</option>
                    <option value="q3">Quận 3</option>
                </select>
                
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" placeholder="Nhập số nhà, đường phố..."></textarea>
                
                <fieldset>
                    <legend>Giới tính</legend>
                    <label for="male">
                        <input type="radio" id="male" name="gender" value="male"> Nam
                    </label>
                    <label for="female">
                        <input type="radio" id="female" name="gender" value="female"> Nữ
                    </label>
                    <label for="other">
                        <input type="radio" id="other" name="gender" value="other"> Khác
                    </label>
                </fieldset>
            </fieldset>
            
            <!-- Checkbox điều khoản -->
            <label for="terms">
                <input type="checkbox" id="terms" name="terms" required> Tôi đồng ý với điều khoản và điều kiện
            </label>
            
            <!-- Nút Submit và Reset -->
            <button type="submit">Đăng ký</button>
            <button type="reset">Xóa</button>
        </form>
    </main>
</body>
</html>
